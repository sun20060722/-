<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>字·墟</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #000; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }
        .poem-line {
            position: absolute;
            color: #e8c97a;
            font-family: "Songti SC", "宋体", "SimSun", serif;
            font-size: 16px; text-shadow: 0 0 10px rgba(232,201,122,0.5);
            opacity: 0; transition: opacity 1.5s ease-in-out;
            pointer-events: none;
            left: 10%; width: 80%; text-align: center; bottom: 15%;
        }
        .notification {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); border: 1px solid #e8c97a;
            color: #e8c97a; padding: 15px 25px;
            font-family: "Songti SC", "宋体", "SimSun", serif;
            font-size: 14px; opacity: 0; transition: opacity 0.5s;
            z-index: 200; pointer-events: none; text-align: center;
            border-radius: 4px; white-space: pre-line;
        }
        .final-line {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #e8c97a;
            font-family: "Songti SC", "宋体", serif;
            font-size: 18px; text-align: center;
            opacity: 0; transition: opacity 2s;
            z-index: 150;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(232,201,122,0.7);
        }
    </style>
</head>
<body>

    <div id="notification" class="notification"></div>
    <div id="overlay"><div id="poem-container"></div></div>
    <div id="final-line" class="final-line">当记忆被存入云端，<br>谁来埋葬这些木头的尸骨？</div>

    <!-- 启动画面 -->
    <div id="start-screen" style="
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 999;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: #e8c97a; font-family: 'Songti SC', '宋体', serif; cursor: pointer;
    ">
        <div style="font-size: 28px; letter-spacing: 0.3em; margin-bottom: 30px;">字·墟</div>
        <div id="start-button" style="
            padding: 15px 40px; border: 1px solid #e8c97a; border-radius: 4px;
            font-size: 18px; background: transparent; color: #e8c97a;
        ">触 碰 墓 碑</div>
        <div style="margin-top: 20px; font-size: 12px; color: #8a7a5a;">点击后允许动作感应</div>
    </div>

    <a-scene background="color: #000" device-orientation-permission-ui="enabled: true">
        <a-camera id="main-camera" look-controls="pointerLockEnabled: false" position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        // ==================== 音效管理器 ====================
        const AudioManager = {
            audioContext: null,
            init() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            },
            playTone(freq, dur, type='sine', vol=0.05) {
                if(!this.audioContext) return;
                const o = this.audioContext.createOscillator();
                const g = this.audioContext.createGain();
                o.type = type; o.frequency.value = freq;
                g.gain.value = vol;
                g.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + dur);
                o.connect(g); g.connect(this.audioContext.destination);
                o.start(); o.stop(this.audioContext.currentTime + dur);
            },
            // 燃烧音效：短促噪声爆破
            playBurnSound() {
                if(!this.audioContext) return;
                const bufferSize = this.audioContext.sampleRate * 0.2;
                const buffer = this.audioContext.createBuffer(1, bufferSize, this.audioContext.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * 0.4));
                }
                const source = this.audioContext.createBufferSource();
                const gain = this.audioContext.createGain();
                gain.gain.value = 0.04;
                source.buffer = buffer;
                source.connect(gain);
                gain.connect(this.audioContext.destination);
                source.start();
            },
            startDrone() {
                if(!this.audioContext) return;
                this.droneOsc = this.audioContext.createOscillator();
                this.droneGain = this.audioContext.createGain();
                this.droneOsc.type = 'sine'; this.droneOsc.frequency.value = 55;
                this.droneGain.gain.value = 0.02;
                this.droneOsc.connect(this.droneGain);
                this.droneGain.connect(this.audioContext.destination);
                this.droneOsc.start();
            },
            stopDrone() {
                if(this.droneGain) {
                    this.droneGain.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime+2);
                    setTimeout(() => { if(this.droneOsc) this.droneOsc.stop(); }, 2000);
                }
            }
        };

        // ==================== 诗句管理 ====================
        const POEM_LINES = {
            act1: [
                '我们是被删掉的部首，','被简化的笔画，','被拼音替代的发音。','',
                '我们是农具的名字，','是雨衣的名字，','是一个村庄在消失之前','最后的呼出。','',
                '现在，我们是数据。'
            ],
            act2: [
                '耒在墙上锈成问号','蓑衣挂在博物馆的玻璃后面','碓声沉入溪底','豳风还在吹','',
                '只是无人识得','那个字','怎么读','',
                '我们把这些字还给你','在它们彻底消失之前','',
                '但你能接住吗','你连它们叫什么','都不知道'
            ]
        };

        function showPoemLine(text, delay, duration) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const container = document.getElementById('poem-container');
                    while (container.firstChild) container.removeChild(container.firstChild);
                    const line = document.createElement('div');
                    line.className = 'poem-line';
                    line.textContent = text;
                    container.appendChild(line);
                    requestAnimationFrame(() => { line.style.opacity = '1'; });
                    setTimeout(() => {
                        line.style.opacity = '0';
                        setTimeout(() => {
                            if (line.parentNode) container.removeChild(line);
                            resolve();
                        }, 1500);
                    }, duration);
                }, delay);
            });
        }

        async function playPoemSequence(lines, lineDuration=3000) {
            for (let i = 0; i < lines.length; i++) {
                if (lines[i] === '') await new Promise(r => setTimeout(r, 1500));
                else await showPoemLine(lines[i], 500, lineDuration);
            }
        }

        function showNotification(text, duration=2000) {
            const n = document.getElementById('notification');
            n.textContent = text; n.style.opacity = '1';
            setTimeout(() => { n.style.opacity = '0'; }, duration);
        }

        // ==================== Canvas 绘制残破汉字 ====================
        function createAncientTexture(character, baseColor = '#e8c97a') {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 180px "Songti SC", "宋体", "SimSun", "Noto Serif SC", serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = baseColor;
            ctx.fillText(character, 128, 128);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const damageProbability = 0.08;
            const blockSize = 4;
            for (let y = 0; y < canvas.height; y += blockSize) {
                for (let x = 0; x < canvas.width; x += blockSize) {
                    if (Math.random() < damageProbability) {
                        const erase = Math.random() < 0.7;
                        for (let dy = 0; dy < blockSize; dy++) {
                            for (let dx = 0; dx < blockSize; dx++) {
                                const index = ((y + dy) * canvas.width + (x + dx)) * 4;
                                if (index >= data.length) continue;
                                if (erase) {
                                    data[index + 3] = 0;
                                } else {
                                    data[index] = Math.floor(data[index] * 0.4);
                                    data[index + 1] = Math.floor(data[index + 1] * 0.4);
                                    data[index + 2] = Math.floor(data[index + 2] * 0.4);
                                }
                            }
                        }
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);

            const noiseData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < noiseData.data.length; i += 4) {
                if (noiseData.data[i + 3] > 0) {
                    const noise = (Math.random() - 0.5) * 20;
                    noiseData.data[i] = Math.min(255, Math.max(0, noiseData.data[i] + noise));
                    noiseData.data[i + 1] = Math.min(255, Math.max(0, noiseData.data[i + 1] + noise));
                    noiseData.data[i + 2] = Math.min(255, Math.max(0, noiseData.data[i + 2] + noise));
                }
            }
            ctx.putImageData(noiseData, 0, 0);

            return canvas;
        }

        // 创建有厚度的字块
        function createCharacterEntity(character, textureCanvas, width = 0.8, height = 0.8, depth = 0.08) {
            const entity = document.createElement('a-box');
            entity.setAttribute('width', width);
            entity.setAttribute('height', height);
            entity.setAttribute('depth', depth);
            entity.setAttribute('material', {
                src: textureCanvas.toDataURL(),
                transparent: true,
                alphaTest: 0.1,
                color: '#8a6e3c'
            });
            return entity;
        }

        // 创建漂浮粒子
        function createParticles(scene, count = 60) {
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('a-sphere');
                particle.setAttribute('radius', 0.02);
                particle.setAttribute('color', '#e8c97a');
                particle.setAttribute('material', 'transparent: true; opacity: 0.4; emissive: #e8c97a; emissiveIntensity: 0.5');
                const angle = Math.random() * Math.PI * 2;
                const radius = 1.5 + Math.random() * 5;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const y = (Math.random() - 0.5) * 4;
                particle.setAttribute('position', `${x} ${y} ${z}`);
                // 缓慢移动动画
                particle.setAttribute('animation', {
                    property: 'position',
                    from: `${x} ${y} ${z}`,
                    to: `${x + (Math.random() - 0.5)*0.5} ${y + (Math.random() - 0.5)*0.3} ${z + (Math.random() - 0.5)*0.5}`,
                    dur: 4000 + Math.random() * 3000,
                    dir: 'alternate',
                    loop: true,
                    easing: 'easeInOutSine'
                });
                scene.appendChild(particle);
            }
        }

        // ==================== 古字数据 ====================
        const ANCIENT_CHARS = [
            { char: '耒', id: 'lei' }, { char: '蓑', id: 'suo' }, { char: '碓', id: 'dui' },
            { char: '罾', id: 'zeng' }, { char: '戽', id: 'hu' }, { char: '豳', id: 'bin' },
            { char: '耜', id: 'si' }, { char: '甑', id: 'zeng2' }, { char: '簦', id: 'deng' },
            { char: '篝', id: 'gou' }, { char: '耰', id: 'you' }, { char: '耧', id: 'lou' }
        ];

        // ==================== 主函数 ====================
        async function runARExperience() {
            AudioManager.init();
            const scene = document.querySelector('a-scene');

            // 生成漂浮粒子
            createParticles(scene, 60);

            // ========== 第一幕：废墟的苏醒 ==========
            AudioManager.startDrone();
            playPoemSequence(POEM_LINES.act1, 3000);

            const total = ANCIENT_CHARS.length;
            const positions = [];
            const sizes = [];
            for (let i = 0; i < total; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 1.5 + Math.random() * 3.5;
                positions.push({
                    x: Math.cos(angle) * radius,
                    y: (Math.random() - 0.3) * 3,
                    z: Math.sin(angle) * radius
                });
                sizes.push(0.4 + Math.random() * 0.6);
            }

            for (let i = 0; i < total; i++) {
                await new Promise(resolve => setTimeout(resolve, 1500));
                const data = ANCIENT_CHARS[i];
                const textureCanvas = createAncientTexture(data.char);
                const size = sizes[i];
                const entity = createCharacterEntity(data.char, textureCanvas, size, size, 0.08);

                entity.setAttribute('id', `char-${data.id}`);
                entity.setAttribute('position', '0 0.5 -2');
                entity.setAttribute('scale', '0.01 0.01 0.01');
                const rotX = (Math.random() - 0.5) * 60;
                const rotY = Math.random() * 360;
                const rotZ = (Math.random() - 0.5) * 30;
                entity.setAttribute('rotation', `${rotX} ${rotY} ${rotZ}`);

                entity.setAttribute('animation__appear', {
                    property: 'scale', to: '1 1 1', dur: 1500, easing: 'easeOutQuad'
                });
                entity.setAttribute('animation__float', {
                    property: 'position',
                    to: `${positions[i].x.toFixed(2)} ${positions[i].y.toFixed(2)} ${positions[i].z.toFixed(2)}`,
                    dur: 2500, easing: 'easeInOutQuad'
                });

                // 添加微动呼吸效果（额外动画）
                entity.setAttribute('animation__breathe', {
                    property: 'scale',
                    from: '0.9 0.9 0.9',
                    to: '1.05 1.05 1.05',
                    dur: 2500,
                    dir: 'alternate',
                    loop: true,
                    easing: 'easeInOutSine'
                });

                scene.appendChild(entity);
                AudioManager.playTone(220 + i * 25, 0.4, 'sine', 0.04);
            }

            await new Promise(r => setTimeout(r, 4000));

            // 点击提示
            ANCIENT_CHARS.forEach(data => {
                const entity = document.getElementById(`char-${data.id}`);
                if (entity) {
                    entity.addEventListener('click', () => {
                        showNotification('此字不在字库中。\n无法复制。\n无法搜索。\n无法翻译。', 2500);
                    });
                }
            });

            // ========== 第二幕：失落的诗 ==========
            AudioManager.stopDrone();
            playPoemSequence(POEM_LINES.act2, 3500);

            // 重排成诗行
            for (let i = 0; i < total; i++) {
                const entity = document.getElementById(`char-${ANCIENT_CHARS[i].id}`);
                if (entity) {
                    const row = Math.floor(i / 4);
                    const col = i % 4;
                    entity.setAttribute('animation__rearrange', {
                        property: 'position',
                        to: `${(col - 1.5) * 0.5} ${1.2 - row * 0.35} -3`,
                        dur: 4000, easing: 'easeInOutQuad'
                    });
                    entity.setAttribute('animation__align', {
                        property: 'rotation', to: '0 0 0', dur: 3000, easing: 'easeInOutQuad'
                    });
                }
            }
            await new Promise(r => setTimeout(r, 10000));

            // ========== 第三幕：余烬 ==========
            // 古字逐个燃烧消失
            for (let i = total - 1; i >= 0; i--) {
                await new Promise(resolve => {
                    setTimeout(() => {
                        const entity = document.getElementById(`char-${ANCIENT_CHARS[i].id}`);
                        if (entity) {
                            // 变红燃烧
                            entity.setAttribute('material', 'color: #ff4400; emissive: #ff4400; emissiveIntensity: 0.8');
                            AudioManager.playBurnSound();

                            // 收缩并消失
                            entity.setAttribute('animation__burn', {
                                property: 'scale',
                                to: '0.01 0.01 0.01',
                                dur: 1200,
                                easing: 'easeInCubic'
                            });
                            setTimeout(() => {
                                if (entity.parentNode) entity.parentNode.removeChild(entity);
                            }, 1200);
                        }
                        resolve();
                    }, i === total - 1 ? 0 : 1200);
                });
            }

            await new Promise(r => setTimeout(r, 2000));

            // 最终诗句浮现
            const finalLine = document.getElementById('final-line');
            finalLine.style.opacity = '1';

            // 低频嗡鸣彻底停止
            AudioManager.stopDrone();

            // 15秒后最终诗句隐去
            setTimeout(() => {
                finalLine.style.opacity = '0';
            }, 15000);
        }

        // ==================== 启动按钮 ====================
        document.getElementById('start-button').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            if (navigator.vibrate) navigator.vibrate(300);
                            runARExperience();
                        }
                    }).catch(console.error);
            } else {
                if (navigator.vibrate) navigator.vibrate(300);
                runARExperience();
            }
        });
    </script>
</body>
</html>
