<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>字·墟</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #000; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100;
        }
        .poem-line {
            position: absolute;
            color: #e8c97a;
            font-family: "Songti SC", "宋体", "SimSun", serif;
            font-size: 16px; text-shadow: 0 0 10px rgba(232,201,122,0.5);
            opacity: 0; transition: opacity 1.5s ease-in-out;
            pointer-events: none;
            left: 10%; width: 80%; text-align: center; bottom: 15%;
        }
        .notification {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); border: 1px solid #e8c97a;
            color: #e8c97a; padding: 15px 25px;
            font-family: "Songti SC", "宋体", "SimSun", serif;
            font-size: 14px; opacity: 0; transition: opacity 0.5s;
            z-index: 200; pointer-events: none; text-align: center;
            border-radius: 4px; white-space: pre-line;
        }
    </style>
</head>
<body>

    <div id="notification" class="notification"></div>
    <div id="overlay"><div id="poem-container"></div></div>

    <!-- 启动画面 -->
    <div id="start-screen" style="
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 999;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: #e8c97a; font-family: 'Songti SC', '宋体', serif; cursor: pointer;
    ">
        <div style="font-size: 28px; letter-spacing: 0.3em; margin-bottom: 30px;">字·墟</div>
        <div id="start-button" style="
            padding: 15px 40px; border: 1px solid #e8c97a; border-radius: 4px;
            font-size: 18px; background: transparent; color: #e8c97a;
        ">触 碰 墓 碑</div>
        <div style="margin-top: 20px; font-size: 12px; color: #8a7a5a;">点击后允许动作感应</div>
    </div>

    <a-scene background="color: #000" device-orientation-permission-ui="enabled: true">
        <a-camera id="main-camera" look-controls="pointerLockEnabled: false" position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        // ==================== 音效管理器（保持不变） ====================
        const AudioManager = { /* ... 同之前代码，此处省略以节省篇幅 ... */ };
        // 实际使用时请将上一条消息中的 AudioManager 完整复制过来

        // ==================== 诗句管理 ====================
        const POEM_LINES = {
            act1: [ '我们是被删掉的部首，','被简化的笔画，','被拼音替代的发音。','', '我们是农具的名字，','是雨衣的名字，','是一个村庄在消失之前','最后的呼出。','', '现在，我们是数据。' ],
            act2: [ '他们扫描了我们，','记录了我们的坐标，','把我们存放在云端。','', '他们说：你们安全了。','你们将永远活着。','', '但我们失去了','被墨弄脏的权利，','被刀刻错的疼痛，','被一双手从木头里唤醒的','那个瞬间。','', '你们的"永远"，','不是我们的活着。' ],
            act3: [ '耒在墙上锈成问号','蓑衣挂在博物馆的玻璃后面','碓声沉入溪底','豳风还在吹','', '只是无人识得','那个字','怎么读','', '我们把这些字还给你','在它们彻底消失之前','', '但你能接住吗','你连它们叫什么','都不知道' ]
        };

        // 诗句显示函数（已修复重叠）
        function showPoemLine(text, delay, duration) {
            return new Promise(resolve => {
                setTimeout(() => {
                    const container = document.getElementById('poem-container');
                    while (container.firstChild) container.removeChild(container.firstChild);
                    const line = document.createElement('div');
                    line.className = 'poem-line';
                    line.textContent = text;
                    container.appendChild(line);
                    requestAnimationFrame(() => { line.style.opacity = '1'; });
                    setTimeout(() => {
                        line.style.opacity = '0';
                        setTimeout(() => {
                            if (line.parentNode) container.removeChild(line);
                            resolve();
                        }, 1500);
                    }, duration);
                }, delay);
            });
        }

        async function playPoemSequence(lines, lineDuration=3000) {
            for (let i = 0; i < lines.length; i++) {
                if (lines[i] === '') await new Promise(r => setTimeout(r, 1500));
                else await showPoemLine(lines[i], 500, lineDuration);
            }
        }

        function showNotification(text, duration=2000) {
            const n = document.getElementById('notification');
            n.textContent = text; n.style.opacity = '1';
            setTimeout(() => { n.style.opacity = '0'; }, duration);
        }

        // ==================== 核心：Canvas 绘制残破汉字 ====================
        function createAncientTexture(character, baseColor = '#e8c97a') {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            // 透明背景
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 设置文字样式
            ctx.font = 'bold 180px "Songti SC", "宋体", "SimSun", "Noto Serif SC", serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = baseColor;

            // 先正常绘制文字
            ctx.fillText(character, 128, 128);

            // 制造残破效果：随机清除一些像素块
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const damageProbability = 0.08; // 8% 的像素被随机破坏
            const blockSize = 4; // 每次破坏一个小方块

            for (let y = 0; y < canvas.height; y += blockSize) {
                for (let x = 0; x < canvas.width; x += blockSize) {
                    if (Math.random() < damageProbability) {
                        // 随机决定是擦除（完全透明）还是变暗
                        const erase = Math.random() < 0.7;
                        for (let dy = 0; dy < blockSize; dy++) {
                            for (let dx = 0; dx < blockSize; dx++) {
                                const index = ((y + dy) * canvas.width + (x + dx)) * 4;
                                if (index >= data.length) continue;
                                if (erase) {
                                    data[index + 3] = 0; // 设为完全透明
                                } else {
                                    // 变暗，模拟磨损
                                    data[index] = Math.floor(data[index] * 0.4);
                                    data[index + 1] = Math.floor(data[index + 1] * 0.4);
                                    data[index + 2] = Math.floor(data[index + 2] * 0.4);
                                }
                            }
                        }
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);

            // 添加一些细微的噪点，模拟出土颗粒
            const noiseData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < noiseData.data.length; i += 4) {
                if (noiseData.data[i + 3] > 0) {
                    const noise = (Math.random() - 0.5) * 20;
                    noiseData.data[i] = Math.min(255, Math.max(0, noiseData.data[i] + noise));
                    noiseData.data[i + 1] = Math.min(255, Math.max(0, noiseData.data[i + 1] + noise));
                    noiseData.data[i + 2] = Math.min(255, Math.max(0, noiseData.data[i + 2] + noise));
                }
            }
            ctx.putImageData(noiseData, 0, 0);

            return canvas;
        }

        // 现代字：光滑金属质感，无残破
        function createModernTexture(character) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 180px "Songti SC", "宋体", "SimSun", serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            // 银灰色
            ctx.fillStyle = '#c0c0c0';
            ctx.fillText(character, 128, 128);
            return canvas;
        }

        // 从 Canvas 创建 A-Frame 图像实体（平面，始终面向相机？不，保持漂浮）
        function createCharacterEntity(character, textureCanvas, width = 0.8, height = 0.8) {
            const entity = document.createElement('a-image');
            entity.setAttribute('src', textureCanvas.toDataURL());
            entity.setAttribute('width', width);
            entity.setAttribute('height', height);
            // 透明背景混合
            entity.setAttribute('material', 'transparent: true; alphaTest: 0.1; depthWrite: false');
            return entity;
        }

        // ==================== 古字、现代字数据 ====================
        const ANCIENT_CHARS = [
            { char: '耒', id: 'lei' }, { char: '蓑', id: 'suo' }, { char: '碓', id: 'dui' },
            { char: '罾', id: 'zeng' }, { char: '戽', id: 'hu' }, { char: '豳', id: 'bin' },
            { char: '耜', id: 'si' }, { char: '甑', id: 'zeng2' }, { char: '簦', id: 'deng' },
            { char: '篝', id: 'gou' }, { char: '耰', id: 'you' }, { char: '耧', id: 'lou' }
        ];
        const MODERN_CHARS = [
            { char: '和', id: 'he' }, { char: '爱', id: 'ai' }, { char: '梦', id: 'meng' }
        ];

        // ==================== 主函数 ====================
        async function runARExperience() {
            // 初始化音效
            AudioManager.init();
            const scene = document.querySelector('a-scene');

            // 第一幕：苏醒
            AudioManager.startDrone();
            playPoemSequence(POEM_LINES.act1, 3000);

            const total = ANCIENT_CHARS.length;
            const positions = [];
            for (let i = 0; i < total; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 1.5 + Math.random() * 3.5;
                positions.push({
                    x: Math.cos(angle) * radius,
                    y: (Math.random() - 0.3) * 3,
                    z: Math.sin(angle) * radius
                });
            }

            // 逐个创建并显示古字
            for (let i = 0; i < total; i++) {
                await new Promise(resolve => setTimeout(resolve, 1500));

                const data = ANCIENT_CHARS[i];
                const textureCanvas = createAncientTexture(data.char);
                const entity = createCharacterEntity(data.char, textureCanvas);

                entity.setAttribute('id', `char-${data.id}`);
                entity.setAttribute('position', '0 0.5 -2');
                entity.setAttribute('scale', '0.01 0.01 0.01');
                // 随机旋转
                const rotX = (Math.random() - 0.5) * 60;
                const rotY = Math.random() * 360;
                const rotZ = (Math.random() - 0.5) * 30;
                entity.setAttribute('rotation', `${rotX} ${rotY} ${rotZ}`);

                entity.setAttribute('animation__appear', {
                    property: 'scale', to: '1 1 1', dur: 1500, easing: 'easeOutQuad'
                });
                entity.setAttribute('animation__float', {
                    property: 'position',
                    to: `${positions[i].x.toFixed(2)} ${positions[i].y.toFixed(2)} ${positions[i].z.toFixed(2)}`,
                    dur: 2500, easing: 'easeInOutQuad'
                });

                scene.appendChild(entity);
                AudioManager.playTone(220 + i * 25, 0.4, 'sine', 0.04);
            }

            await new Promise(r => setTimeout(r, 4000));

            // 点击提示
            ANCIENT_CHARS.forEach(data => {
                const entity = document.getElementById(`char-${data.id}`);
                if (entity) {
                    entity.addEventListener('click', () => {
                        showNotification('此字不在字库中。\n无法复制。\n无法搜索。\n无法翻译。', 2500);
                    });
                }
            });

            // 第二幕：现代字掉落
            playPoemSequence(POEM_LINES.act2, 3000);
            for (let i = 0; i < MODERN_CHARS.length; i++) {
                await new Promise(resolve => {
                    setTimeout(() => {
                        const data = MODERN_CHARS[i];
                        const textureCanvas = createModernTexture(data.char);
                        const entity = createCharacterEntity(data.char, textureCanvas, 1.0, 1.0);
                        entity.setAttribute('id', `modern-${data.id}`);
                        const angle = Math.random() * Math.PI * 2;
                        const radius = 2 + Math.random() * 3;
                        const x = Math.cos(angle) * radius;
                        const z = Math.sin(angle) * radius;
                        entity.setAttribute('position', `${x.toFixed(2)} 4 ${z.toFixed(2)}`);
                        entity.setAttribute('animation__fall', {
                            property: 'position',
                            from: `${x.toFixed(2)} 4 ${z.toFixed(2)}`,
                            to: `${x.toFixed(2)} ${Math.random() * 2 - 0.5} ${z.toFixed(2)}`,
                            dur: 1500, easing: 'easeInBounce'
                        });
                        scene.appendChild(entity);
                        AudioManager.playMetalSound();
                        resolve();
                    }, i * 2000);
                });
            }
            await new Promise(r => setTimeout(r, 3000));

            // 第三幕：重排成诗
            AudioManager.stopDrone();
            playPoemSequence(POEM_LINES.act3, 3500);
            for (let i = 0; i < total; i++) {
                const entity = document.getElementById(`char-${ANCIENT_CHARS[i].id}`);
                if (entity) {
                    const row = Math.floor(i / 4);
                    const col = i % 4;
                    entity.setAttribute('animation__rearrange', {
                        property: 'position',
                        to: `${(col - 1.5) * 0.5} ${1.2 - row * 0.35} -3`,
                        dur: 4000, easing: 'easeInOutQuad'
                    });
                    entity.setAttribute('animation__align', {
                        property: 'rotation', to: '0 0 0', dur: 3000, easing: 'easeInOutQuad'
                    });
                }
            }
            MODERN_CHARS.forEach((data, i) => {
                const entity = document.getElementById(`modern-${data.id}`);
                if (entity) {
                    entity.setAttribute('animation__push', {
                        property: 'position',
                        to: `${(i - 1) * 2} -0.5 -5`, dur: 3000, easing: 'easeInOutQuad'
                    });
                }
            });
        }

        // ==================== 启动逻辑 ====================
        document.getElementById('start-button').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            // 请求陀螺仪权限（iOS）
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') start();
                    }).catch(console.error);
            } else {
                start();
            }
        });

        function start() {
            if (navigator.vibrate) navigator.vibrate(300);
            runARExperience();
        }
    </script>
</body>
</html>
